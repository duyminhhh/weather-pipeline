# render.yaml — đặt ở ROOT repo (cùng cấp README.md, requirements.txt)
#
# Cấu trúc repo:
#   your-repo/
#   ├── render.yaml          ← file này
#   ├── weather-dashboard/
#   │   ├── proxy.cjs        ← backend proxy
#   │   ├── package.json
#   │   └── src/
#   ├── crawler/
#   └── notebooks/

services:

  # ── 1. Backend Proxy (Node.js) ─────────────────────────────────────────────
  # Forward /api/databricks/* và /api/weather/* để tránh CORS
  - type: web
    name: weather-pipeline-proxy
    runtime: node
    buildCommand: cd weather-dashboard && npm install
    startCommand: cd weather-dashboard && node proxy.cjs
    envVars:
      - key: DATABRICKS_HOST
        sync: false   # điền trong Render Dashboard, ví dụ: https://adb-xxxx.azuredatabricks.net
      - key: DATABRICKS_TOKEN
        sync: false   # điền trong Render Dashboard: dapixxxxxxxxxxxxxxxx

  # ── 2. Frontend Static Site ────────────────────────────────────────────────
  - type: web
    name: weather-pipeline-dashboard
    runtime: static
    buildCommand: cd weather-dashboard && npm install && npm run build
    staticPublishPath: ./weather-dashboard/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_PROXY_URL
        sync: false   # điền URL của proxy sau khi deploy, ví dụ: https://weather-pipeline-proxy.onrender.com
    # domains:
    #   - weather.yourdomain.com